model:
  base_learning_rate: 0.0001
  target: dc_ldm.models.diffusion.ddpm.LatentDiffusion
  params:
    linear_start: 0.0015
    linear_end: 0.0195
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: image
    cond_stage_key: fmri
    image_size: 32
    channels: 4
    cond_stage_trainable: true
    conditioning_key: crossattn
    monitor: val/loss
    use_ema: False
    scale_factor: 0.18215

    unet_config:
      target: dc_ldm.modules.diffusionmodules.pixart.PixArtForFMRI
      params:
        image_size: 32
        patch_size: 2
        in_channels: 4
        out_channels: 4
        hidden_size: 1152
        depth: 28
        num_heads: 16
        mlp_ratio: 4.0
        context_dim: 512
        block_type: adaLN-single
        use_time_cond: true
        global_pool: false
        dropout: 0.0
        use_checkpoint: false

    first_stage_config:
      target: dc_ldm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
        lossconfig:
          target: torch.nn.Identity

    cond_stage_config:
      target: dc_ldm.modules.encoders.modules.ClassEmbedder
      params:
        n_classes: 1001
        embed_dim: 512
        key: class_label
