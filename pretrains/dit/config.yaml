model:
  base_learning_rate: 0.0001
  target: dc_ldm.models.diffusion.ddpm.LatentDiffusion
  params:
    linear_start: 0.00085
    linear_end: 0.012
    num_timesteps_cond: 1
    log_every_t: 200
    timesteps: 1000
    first_stage_key: image
    cond_stage_key: fmri
    image_size: 32
    channels: 4
    cond_stage_trainable: true
    conditioning_key: crossattn
    scale_factor: 0.18215
    monitor: val/loss
    use_ema: False

    unet_config:
      target: dc_ldm.modules.diffusionmodules.dit.DiT_fMRI
      params:
        input_size: 32
        patch_size: 2
        in_channels: 4
        hidden_size: 1152
        depth: 28
        num_heads: 16
        mlp_ratio: 4.0
        learn_sigma: true
        context_dim: 1152
        use_time_cond: true
        global_pool: false

    first_stage_config:
      target: dc_ldm.ldm_for_fmri.SDVAEWrapper
      params: {}

    cond_stage_config:
      target: dc_ldm.modules.encoders.modules.ClassEmbedder
      params:
        n_classes: 1001
        embed_dim: 1152
        key: class_label
